# Kivy Buildozer Android CI (Manual Setup)
name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libffi-dev git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libsqlite3-dev ccache libssl-dev
          pip install --user --upgrade buildozer Cython==0.29.33

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer android debug
        env:
          # Buildozer needs to accept Android SDK license
          BUILDOZER_ALLOW_ORG_ROOT_OVERRIDE: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Vision-Guide-APK
          path: bin/*.apk
