# Kivy Buildozer Android CI (Robust Setup)
name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: |
          echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            libffi-dev \
            git \
            zip \
            unzip \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libsqlite3-dev \
            ccache \
            libssl-dev \
            libbz2-dev \
            liblzma-dev \
            libgdbm-dev \
            libnss3-dev \
            tk-dev \
            libreadline-dev \
            libdb5.3-dev \
            libexpat1-dev \
            libmpdec-dev
          pip install --user --upgrade buildozer Cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          # Configure Java
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          
          # Add local bin to path
          export PATH=$PATH:$HOME/.local/bin
          
          # Fix for buildozer looking for sdkmanager in the old tools/bin folder
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          ln -s /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager || true
          
          # Pre-accept licenses and install required platforms and build-tools
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"
          
          # Fix Gradle memory limits
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.daemon=false"
          
          # Buildozer debug
          buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_ROOT_OVERRIDE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Vision-Guide-APK
          path: bin/*.apk
